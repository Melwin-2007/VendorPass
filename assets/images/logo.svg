<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A4A" />
      <stop offset="100%" stop-color="#0F2430" />
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect x="4" y="4" width="120" height="120" rx="32" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />

  <!-- Shield Group Centered -->
  <g transform="translate(24, 24) scale(1.25)">
    <!-- Shield Outline -->
    <path
      d="M32 4L54 14V30C54 42.15 44.6 53.42 32 58C19.4 53.42 10 42.15 10 30V14L32 4Z"
      fill="rgba(255, 255, 255, 0.05)"
      stroke="#D4820A"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- V Checkmark -->
    <path
      d="M22 28L30 42L42 22"
      stroke="#FFFFFF"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Smile / Wave -->
    <path
      d="M18 48C22 45 28 45 32 48C36 51 42 51 46 48"
      stroke="#D4820A"
      stroke-width="2"
      stroke-linecap="round"
    />
    <!-- Spark Dot -->
    <circle cx="42" cy="22" r="3" fill="#D4820A" />
  </g>
</svg>
